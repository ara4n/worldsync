<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>worldsync jig</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0e1116; }
  canvas { display: block; }
  #panel {
    position: fixed; top: 10px; right: 10px; width: 310px;
    max-height: calc(100vh - 20px); display: flex; flex-direction: column;
    background: rgba(13, 17, 23, 0.88); border: 1px solid #30363d; border-radius: 8px;
    color: #c9d1d9; font: 11px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
    padding: 10px 12px; user-select: none; box-sizing: border-box;
  }
  #panel h1 { font-size: 13px; margin: 0 0 6px; color: #e6edf3; cursor: pointer; }
  #panel h1 .caret { color: #8b949e; font-size: 11px; }
  #panel #body { overflow-y: auto; min-height: 0; }
  #panel.collapsed #body { display: none; }
  #panel.collapsed h1 { margin-bottom: 0; }
  #panel label { display: block; margin: 2px 0; }
  #panel input[type=range] { width: 120px; vertical-align: middle; }
  #panel input[type=number] { width: 60px; background: #161b22; color: #c9d1d9; border: 1px solid #30363d; border-radius: 4px; }
  #panel table { border-collapse: collapse; margin-top: 6px; width: 100%; }
  #panel th, #panel td { text-align: left; padding: 1px 6px 1px 0; }
  #panel th { color: #8b949e; font-weight: normal; }
  #panel tr.excluded td { color: #f85149; }
  #panel .hint { color: #8b949e; }
  #panel #status { margin-top: 8px; }
  #panel #log { margin-top: 8px; border-top: 1px solid #30363d; padding-top: 6px; color: #8b949e; max-height: 140px; overflow: hidden; }
  #help {
    position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); white-space: nowrap;
    color: #8b949e; font: 12px ui-monospace, SFMono-Regular, Menlo, monospace;
    background: rgba(13, 17, 23, 0.7); padding: 6px 12px; border-radius: 6px; pointer-events: none;
  }
</style>
</head>
<body>
<div id="panel"></div>
<div id="help">click ground: spawn box &nbsp;|&nbsp; drag box: move it &nbsp;|&nbsp; cmd-drag or right-drag: orbit &nbsp;|&nbsp; wheel: zoom</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
